name: Build desktop apps

on:
  workflow_dispatch:
    inputs:
      run_global_hotkey_probe:
        description: "Run the interactive global hotkey probe on the runner"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS universal
            os: macos-latest
            rust_targets: x86_64-apple-darwin aarch64-apple-darwin
            tauri_target: universal-apple-darwin
            tauri_bundles: app
            artifact_name: Dictivo-macOS-universal
            bundle_path: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle
          - label: Windows x64
            os: windows-2025-vs2026
            rust_targets: x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc
            tauri_bundles: msi,nsis
            artifact_name: Dictivo-Windows-x64-installers
            bundle_path: apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        shell: bash
        run: |
          rustup update stable
          rustup default stable
          for target in ${{ matrix.rust_targets }}; do
            rustup target add "$target"
          done

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Rust format check
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --check

      - name: Rust unit tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Global hotkey probe
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_global_hotkey_probe }}
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --test global_hotkey_probe -- --ignored --nocapture

      - name: Install Playwright browser
        run: npm exec -w @dictivo/desktop -- playwright install chromium

      - name: E2E
        run: npm run e2e

      - name: Whitespace check
        run: git diff --check

      - name: Prepare Private Fast engine
        run: node scripts/prepare-private-fast-engine.mjs

      - name: Build Tauri bundle
        run: npm run tauri:build -w @dictivo/desktop -- --target ${{ matrix.tauri_target }} --bundles ${{ matrix.tauri_bundles }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_path }}/**
          if-no-files-found: error
          retention-days: 90
