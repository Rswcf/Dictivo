name: Build desktop apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS universal
            os: macos-latest
            rust_targets: x86_64-apple-darwin aarch64-apple-darwin
            tauri_target: universal-apple-darwin
            artifact_name: Dictivo-macOS-universal
            bundle_path: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle
          - label: Windows x64
            os: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc
            artifact_name: Dictivo-Windows-x64
            bundle_path: apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        shell: bash
        run: |
          rustup update stable
          rustup default stable
          for target in ${{ matrix.rust_targets }}; do
            rustup target add "$target"
          done

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build Tauri bundle
        run: npm run tauri:build -w @dictivo/desktop -- --target ${{ matrix.tauri_target }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_path }}/**
          if-no-files-found: error
          retention-days: 90
