name: Build desktop apps

# CI builds both macOS and Windows so we can keep testing Windows before public
# launch. Release tags are handled by release-desktop.yml; Windows artifacts
# from this workflow are validation builds, not public release assets.

on:
  workflow_dispatch:
    inputs:
      run_global_hotkey_probe:
        description: "Run the interactive global hotkey probe on the runner"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS universal
            os: macos-latest
            rust_targets: x86_64-apple-darwin aarch64-apple-darwin
            tauri_target: universal-apple-darwin
            tauri_bundles: app
            artifact_name: Dictivo-macOS-universal
            bundle_path: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle
          - label: Windows x64
            os: windows-2025-vs2026
            rust_targets: x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc
            tauri_bundles: msi,nsis
            artifact_name: Dictivo-Windows-x64-installers
            bundle_path: apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        shell: bash
        run: |
          rustup update stable
          rustup default stable
          for target in ${{ matrix.rust_targets }}; do
            rustup target add "$target"
          done

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Rust format check
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --check

      - name: Rust unit tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Global hotkey probe
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_global_hotkey_probe }}
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --test global_hotkey_probe -- --ignored --nocapture

      - name: Install Playwright browser
        run: npm exec -w @dictivo/desktop -- playwright install chromium

      - name: E2E
        run: npm run e2e

      - name: Whitespace check
        run: git diff --check

      - name: Prepare Private Fast engine
        run: node scripts/prepare-private-fast-engine.mjs

      - name: Build Tauri bundle
        env:
          # createUpdaterArtifacts: true in tauri.conf.json means every tauri
          # build emits a signed updater payload — even from this CI workflow
          # whose only job is to prove the code compiles. Without the key, the
          # signing step fails and the entire workflow goes red. The key
          # itself is identical to the one the release workflow uses; signed
          # CI artifacts are validation-only and never published.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build -w @dictivo/desktop -- --target ${{ matrix.tauri_target }} --bundles ${{ matrix.tauri_bundles }}

      - name: Windows installer smoke
        if: ${{ matrix.os == 'windows-2025-vs2026' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $bundleRoot = "${{ matrix.bundle_path }}"
          $config = Get-Content "apps/desktop/src-tauri/tauri.conf.json" | ConvertFrom-Json
          $version = $config.version
          $nsisPattern = "^Dictivo_" + [regex]::Escape($version) + "_x64-setup\.exe$"
          $msiPattern = "^Dictivo_" + [regex]::Escape($version) + "_x64_en-US\.msi$"

          $nsis = Get-ChildItem -Path (Join-Path $bundleRoot "nsis") -Filter "Dictivo_*_x64-setup.exe" -File | Select-Object -First 1
          if (-not $nsis) {
            throw "Missing NSIS setup executable in $bundleRoot"
          }
          if ($nsis.Name -notmatch $nsisPattern) {
            throw "NSIS setup name '$($nsis.Name)' does not match app version $version"
          }

          $msi = Get-ChildItem -Path (Join-Path $bundleRoot "msi") -Filter "Dictivo_*_x64_en-US.msi" -File | Select-Object -First 1
          if (-not $msi) {
            throw "Missing MSI installer in $bundleRoot"
          }
          if ($msi.Name -notmatch $msiPattern) {
            throw "MSI name '$($msi.Name)' does not match app version $version"
          }

          foreach ($signature in @("$($nsis.FullName).sig", "$($msi.FullName).sig")) {
            if (-not (Test-Path $signature)) {
              throw "Missing updater signature $signature"
            }
          }

          $process = Start-Process -FilePath $nsis.FullName -ArgumentList "/S" -Wait -PassThru -WindowStyle Hidden
          if ($process.ExitCode -ne 0) {
            throw "NSIS silent install failed with exit code $($process.ExitCode)"
          }

          $installRoots = @(
            (Join-Path $env:LOCALAPPDATA "Programs\Dictivo"),
            (Join-Path $env:LOCALAPPDATA "Dictivo"),
            (Join-Path $env:ProgramFiles "Dictivo")
          )
          $programFilesX86 = [Environment]::GetEnvironmentVariable("ProgramFiles(x86)")
          if ($programFilesX86) {
            $installRoots += (Join-Path $programFilesX86 "Dictivo")
          }

          $installedExe = $null
          foreach ($root in $installRoots) {
            $candidate = Join-Path $root "Dictivo.exe"
            if (Test-Path $candidate) {
              $installedExe = Get-Item $candidate
              break
            }
          }

          if (-not $installedExe) {
            $programsRoot = Join-Path $env:LOCALAPPDATA "Programs"
            if (Test-Path $programsRoot) {
              $installedExe = Get-ChildItem -Path $programsRoot -Filter "Dictivo.exe" -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
            }
          }

          if (-not $installedExe) {
            throw "NSIS silent install did not create Dictivo.exe"
          }
          if ($installedExe.Length -le 0) {
            throw "Installed Dictivo.exe is empty"
          }

          Write-Host "Installed $($installedExe.FullName) ($($installedExe.Length) bytes)"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_path }}/**
          if-no-files-found: error
          retention-days: 14
