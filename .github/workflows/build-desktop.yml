name: Build desktop apps

# CI is intentionally macOS-only while Dictivo is in its macOS-first launch
# window. Release tags are handled by release-desktop.yml so the Actions page
# does not keep producing stale Windows installers.

on:
  workflow_dispatch:
    inputs:
      run_global_hotkey_probe:
        description: "Run the interactive global hotkey probe on the runner"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: macOS universal
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Rust format check
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml --check

      - name: Rust unit tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Global hotkey probe
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_global_hotkey_probe }}
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --test global_hotkey_probe -- --ignored --nocapture

      - name: Install Playwright browser
        run: npm exec -w @dictivo/desktop -- playwright install chromium

      - name: E2E
        run: npm run e2e

      - name: Whitespace check
        run: git diff --check

      - name: Prepare Private Fast engine
        run: node scripts/prepare-private-fast-engine.mjs

      - name: Build Tauri bundle
        env:
          # createUpdaterArtifacts: true in tauri.conf.json means every tauri
          # build emits a signed updater payload — even from this CI workflow
          # whose only job is to prove the code compiles. Without the key, the
          # signing step fails and the entire workflow goes red. The key
          # itself is identical to the one the release workflow uses; signed
          # CI artifacts are validation-only and never published.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build -w @dictivo/desktop -- --target universal-apple-darwin --bundles app

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: Dictivo-macOS-universal
          path: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/**
          if-no-files-found: error
          retention-days: 14
